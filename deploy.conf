#!/usr/bin/env bash
# =============================================================================
#  FRS DEPLOYMENT CONFIGURATION
#  Motivity Face Recognition System — deploy.conf
# =============================================================================
#
#  Fill this file BEFORE running deploy-app.sh.
#  deploy-app.sh sources it automatically if it sits in the same directory.
#
#  Usage:
#    1. Edit this file with your values
#    2. sudo ./deploy-app.sh
#       (or: sudo ./deploy-app.sh --config /path/to/deploy.conf)
#
#  Markers:
#    [REQUIRED]        Must be set — deploy will abort if empty
#    [AUTO]            Leave blank to auto-generate a secure random value
#    [DERIVED]         Calculated from other values — do not set manually
#    [OPTIONAL]        Feature disabled if not set; safe to leave blank
#    [DEFAULT: x]      Has a built-in default; override only if needed
# =============================================================================


# =============================================================================
#  SECTION 1 — DEPLOYMENT MODE
#  Controls how URLs, nginx, and SSL are configured.
# =============================================================================

# [REQUIRED] Deployment mode. One of:
#   ip-only        — No domain. App served at http://<SERVER_IP>. Keycloak at <IP>:9090.
#   domain-http    — Custom domain, no SSL (internal/on-prem without public certs).
#   domain-ssl     — Custom domain + HTTPS via certbot (production, public internet).
#   selfsigned     — Custom domain + self-signed TLS cert (on-prem with TLS, no public DNS).
#   dev            — localhost only; skips nginx, PM2, SSL, Keycloak provisioning.
DEPLOY_MODE=ip-only

# [OPTIONAL] Your server's public (or LAN) IP address.
#   Leave blank to auto-detect from: hostname -I (first address)
#   Set explicitly when the machine has multiple NICs or a floating/elastic IP.
SERVER_IP=

# [REQUIRED for domain-* and selfsigned modes] Fully-qualified domain name.
#   Examples: frs.motivitylabs.com   frs.company.local
#   Leave blank for ip-only / dev mode.
DOMAIN=

# [OPTIONAL] Email address for certbot (Let's Encrypt) registration.
#   Required when DEPLOY_MODE=domain-ssl. Ignored for all other modes.
CERTBOT_EMAIL=

# [REQUIRED] Absolute path to the Motivity-Face_Recognition_System repo.
#   Leave blank to auto-detect (searches relative to this script, then common paths).
APP_DIR=

# [DEFAULT: production] Node.js environment.
#   production   — strict CORS, no stack traces in API errors, validates secrets
#   development  — relaxed CORS, verbose errors
NODE_ENV=production

# [DEFAULT: keycloak] Backend authentication mode.
#   keycloak     — OIDC via Keycloak (recommended for all non-dev deployments)
#   api          — Legacy email/password JWT (no Keycloak required)
#   mock         — No auth at all (dev/testing only — NEVER use in production)
AUTH_MODE=keycloak


# =============================================================================
#  SECTION 2 — DATABASE (PostgreSQL)
# =============================================================================

# [DEFAULT: localhost] PostgreSQL host.
#   Use localhost for same-server installs (installed by install.sh).
#   Use an IP or hostname for a remote/managed DB (RDS, Cloud SQL, etc.).
DB_HOST=localhost

# [DEFAULT: 5432]
DB_PORT=5432

# [REQUIRED] Name of the application database.
#   Must match the DB created by install.sh (default: FRS).
DB_NAME=FRS

# [DEFAULT: postgres] Database user.
DB_USER=postgres

# [REQUIRED] Database password.
#   Must match the password used when install.sh provisioned the DB.
DB_PASSWORD=

# [DEFAULT: false] Enable SSL for DB connections.
#   Set to true for remote/managed databases (RDS, Cloud SQL).
#   Leave false for same-server installs.
DB_SSL=false

# [DEFAULT: false] When DB_SSL=true, whether to reject self-signed server certs.
#   Set to true only if the DB has a valid CA-signed certificate.
DB_SSL_REJECT_UNAUTHORIZED=false

# --- DB tuning (safe to leave at defaults) ---
DB_POOL_MAX=20
DB_IDLE_TIMEOUT_MS=30000
DB_CONNECTION_TIMEOUT_MS=5000
DB_KEEPALIVE=true
DB_KEEPALIVE_DELAY_MS=10000
STATEMENT_TIMEOUT_MS=30000


# =============================================================================
#  SECTION 3 — KEYCLOAK (Identity Provider)
# =============================================================================

# [DEFAULT: 9090] Port Keycloak listens on.
#   Set by install.sh. Only change if you configured a non-standard port.
KEYCLOAK_HTTP_PORT=9090

# [REQUIRED] Keycloak admin console username.
#   Set during install.sh (KEYCLOAK_ADMIN_USER). Default: admin.
KEYCLOAK_ADMIN_USER=admin

# [REQUIRED] Keycloak admin console password.
#   Must match what was set during install.sh (KEYCLOAK_ADMIN_PASSWORD).
KEYCLOAK_ADMIN_PASSWORD=

# [DEFAULT: attendance] Keycloak realm for this application.
#   Only change if you deliberately want a different realm name.
KEYCLOAK_REALM=attendance

# [DEFAULT: attendance-frontend] Keycloak public client for the React frontend.
KEYCLOAK_CLIENT_ID=attendance-frontend

# [DEFAULT: attendance-api] Keycloak bearer-only client for the backend API.
KEYCLOAK_API_CLIENT_ID=attendance-api

# [DEFAULT: motivity-frs] Login theme applied to every Keycloak realm.
#   Leave blank to use Keycloak's built-in theme.
KEYCLOAK_LOGIN_THEME=motivity-frs

# [DEFAULT: 5] Seconds of clock skew tolerated when validating JWTs.
KEYCLOAK_CLOCK_TOLERANCE_SEC=5

# [DEFAULT: false] Strict audience check on JWT tokens.
#   Set to true only after configuring an audience mapper in Keycloak.
KEYCLOAK_STRICT_AUDIENCE=false


# =============================================================================
#  SECTION 4 — APPLICATION SECRETS
#  Leave blank → deploy-app.sh generates a cryptographically secure value
#  and saves it to .deploy-secrets.env (root of APP_DIR).
#  On re-deploy the existing values are preserved automatically.
# =============================================================================

# [AUTO] Secret for signing device JWT tokens. Min 32 chars.
#   Generate manually: openssl rand -hex 32
DEVICE_JWT_SECRET=

# [AUTO] Secret for signing enrollment invitation tokens. Min 32 chars.
ENROLLMENT_TOKEN_SECRET=

# [AUTO] Bearer token required to call GET /api/metrics (Prometheus scrape).
METRICS_AUTH_TOKEN=

# [AUTO] Bearer token required to call GET /api/health (optional protection).
HEALTH_AUTH_TOKEN=

# [AUTO] API key expected in X-Api-Key header from HRMS webhook calls.
HRMS_WEBHOOK_API_KEY=

# [AUTO] HMAC secret for verifying Jetson enrollment webhook signatures.
JETSON_WEBHOOK_SECRET=

# [OPTIONAL] 64-hex-char AES-256 key for encrypting face embeddings at rest.
#   Leave blank to store embeddings unencrypted.
#   Generate: openssl rand -hex 32
#   WARNING: If you set this after data exists, existing embeddings can't be read.
EMBEDDING_ENCRYPTION_KEY=

# [DEFAULT: v1] Key version tag stored alongside encrypted embeddings.
#   Increment (v2, v3...) when rotating EMBEDDING_ENCRYPTION_KEY.
EMBEDDING_ENCRYPTION_KEY_ID=v1


# =============================================================================
#  SECTION 5 — REDIS
# =============================================================================

# [OPTIONAL] Redis URL for distributed rate-limiting.
#   Leave blank to use in-process rate limiting (fine for single-node installs).
#   Format: redis://:<password>@<host>:<port>
#   Default for local install.sh Redis: redis://localhost:6379
REDIS_URL=redis://localhost:6379


# =============================================================================
#  SECTION 6 — KAFKA
# =============================================================================

# [DEFAULT: localhost:9092] Comma-separated Kafka broker addresses.
#   install.sh runs a single-node KRaft Kafka on localhost:9092.
KAFKA_BROKERS=localhost:9092

# [DEFAULT: scanalitix.] Prefix for all Kafka topic names.
KAFKA_TOPIC_PREFIX=scanalitix.

# [DEFAULT: scanalitix-node] Kafka producer/consumer client ID.
KAFKA_CLIENT_ID=scanalitix-node

# [DEFAULT: scanalitix-consumer-group]
KAFKA_GROUP_ID=scanalitix-consumer-group

# [DEFAULT: 3] Number of partitions per topic.
KAFKA_NUM_PARTITIONS=3

# [DEFAULT: 1] Replication factor (1 = single broker, increase for clusters).
KAFKA_REPLICATION_FACTOR=1

# --- Kafka SSL/SASL (leave blank for plain local Kafka from install.sh) ---
KAFKA_SSL_ENABLED=false
KAFKA_SASL_MECHANISM=
KAFKA_SASL_USERNAME=
KAFKA_SASL_PASSWORD=


# =============================================================================
#  SECTION 7 — EMAIL / SMTP
#  Used for: password-reset, user invitations, enrollment links.
#  Leave all blank to disable email (invites will still work via copied link).
# =============================================================================

# [OPTIONAL] Email service name. One of: gmail, sendgrid, ses, smtp
SMTP_SERVICE=gmail

# [OPTIONAL] SMTP username / sender address.
SMTP_USER=

# [OPTIONAL] SMTP password or app-specific password.
SMTP_PASSWORD=

# [OPTIONAL] Override SMTP host (auto-resolved from SMTP_SERVICE if blank).
#   Required for SMTP_SERVICE=smtp. Examples: smtp.sendgrid.net, email-smtp.us-east-1.amazonaws.com
SMTP_HOST=

# [DEFAULT: 587] SMTP port. Common values: 587 (STARTTLS), 465 (SSL), 25 (plain).
SMTP_PORT=587

# [OPTIONAL] From address shown to recipients.
SMTP_FROM=

# [DEFAULT: FRS] Display name shown to recipients.
SMTP_FROM_NAME=FRS

# [OPTIONAL] Reply-to address. Defaults to SMTP_USER.
SMTP_REPLY_TO=


# =============================================================================
#  SECTION 8 — ALERTING INTEGRATIONS
#  Optional. Leave blank to disable each channel.
# =============================================================================

# [OPTIONAL] Slack incoming webhook URL for system alerts.
#   Create at: https://api.slack.com/messaging/webhooks
ALERT_SLACK_WEBHOOK_URL=

# [DEFAULT: false] Include verbose detail in Slack alerts.
ALERT_SLACK_VERBOSE=false

# [OPTIONAL] PagerDuty Events API v2 integration key for critical alerts.
PAGERDUTY_INTEGRATION_KEY=


# =============================================================================
#  SECTION 9 — JETSON / EDGE AI DEVICES
#  Only needed if Nvidia Jetson cameras are connecting to this server.
# =============================================================================

# [OPTIONAL] Comma-separated IPs allowed to POST enrollment events from Jetson.
#   Leave blank to allow all IPs (less secure).
#   Example: 192.168.1.50,192.168.1.51
JETSON_IP_ALLOWLIST=

# [OPTIONAL] Comma-separated IPs allowed to call health/metrics endpoints.
#   Leave blank to allow all (protect with HEALTH_AUTH_TOKEN instead).
HEALTH_IP_ALLOWLIST=
METRICS_IP_ALLOWLIST=

# [OPTIONAL] Shared HMAC secret for verifying Jetson event payloads.
#   Separate from JETSON_WEBHOOK_SECRET — this covers per-event signatures.
JETSON_EVENT_SECRET=

# [DEFAULT: false] Force HTTP (not HTTPS) connections to Jetson devices.
#   Set true when Jetson devices don't have valid TLS certs.
JETSON_FORCE_HTTP=true

# [OPTIONAL] Jetson sidecar service URL (Python inference process on Jetson).
#   Only needed when ENABLE_FACE_RECOGNITION=true and Jetson is connected.
#   Example: http://192.168.1.50:5000
JETSON_SIDECAR_URL=

# [OPTIONAL] Model version string reported back to Jetson during bootstrap.
JETSON_MODEL_VERSION=1.0.0

# [OPTIONAL] Absolute path on THIS server where remote enrollment photos land.
#   Defaults to APP_DIR/backend/uploads/remote-enrollment
REMOTE_ENROLLMENT_PHOTO_DIR=


# =============================================================================
#  SECTION 10 — FACE & AI FEATURES
# =============================================================================

# [DEFAULT: false] Enable on-device face recognition via ONNX runtime.
#   Requires face model files in MODEL_PATH. Only enable when models are present.
ENABLE_FACE_RECOGNITION=false

# [DEFAULT: false] Enable ALPR (Automatic License Plate Recognition).
ENABLE_ALPR=false

# [DEFAULT: false] Enable Re-ID (person re-identification across cameras).
ENABLE_REID=false

# [DEFAULT: 0.50] Minimum cosine similarity score to count as a face match.
#   Range: 0.0–1.0. Lower = more permissive, higher = stricter.
FACE_MATCH_THRESHOLD=0.50

# [DEFAULT: 5050] Port the face quality microservice (gunicorn/Flask) runs on.
FACE_QUALITY_PORT=5050

# [DEFAULT: 0.60] Minimum quality score (0–1) for enrollment photos.
DEFAULT_FACE_QUALITY_THRESHOLD=0.60

# [OPTIONAL] Path to ONNX model files directory.
#   Defaults to APP_DIR/backend/models. Only matters when ENABLE_FACE_RECOGNITION=true.
MODEL_PATH=

# [OPTIONAL] Path to face embedding SQLite database.
#   Defaults to APP_DIR/backend/data/faces.db
FACE_DB_PATH=


# =============================================================================
#  SECTION 11 — GOOGLE INTEGRATIONS (Optional)
# =============================================================================

# [OPTIONAL] Google Calendar API key for fetching public holidays.
#   Get at: https://console.cloud.google.com → APIs & Services → Credentials
GOOGLE_CALENDAR_API_KEY=

# [OPTIONAL] Google Calendar ID for your company's holiday calendar.
#   Example: en.indian#holiday@group.v.calendar.google.com
COMPANY_CALENDAR_ID=

# [OPTIONAL] Additional holiday calendar ID.
HOLIDAY_CALENDAR_ID=


# =============================================================================
#  SECTION 12 — MONITORING & OBSERVABILITY (Optional)
# =============================================================================

# [OPTIONAL] Sentry DSN for backend error tracking.
#   Get at: https://sentry.io → Project Settings → Client Keys
SENTRY_DSN=

# [OPTIONAL] Sentry DSN for frontend error tracking (baked into the Vite build).
#   Can be the same as SENTRY_DSN or a separate Sentry project.
VITE_SENTRY_DSN=

# [DEFAULT: info] Backend log level. One of: debug, info, warn, error
LOG_LEVEL=info

# [OPTIONAL] External Prometheus/Grafana monitoring URL for the backend to push metrics to.
MONITORING_URL=


# =============================================================================
#  SECTION 13 — APPLICATION BEHAVIOUR
# =============================================================================

# [DEFAULT: FRS Backend] Application name shown in alerts and logs.
APP_NAME="FRS Backend"

# [DEFAULT: UTC] Timezone for attendance calculations, cron jobs, and reports.
#   Use IANA timezone names: Asia/Kolkata, America/New_York, Europe/London, etc.
APP_TIMEZONE=UTC

# [DEFAULT: 30] Minutes of idle time before the frontend auto-logs-out the user.
VITE_IDLE_TIMEOUT_MINUTES=30

# [DEFAULT: 5] Minutes after last heartbeat before a device is marked offline.
DEVICE_OFFLINE_THRESHOLD_MIN=5

# [DEFAULT: 2592000] Device token TTL in seconds (default: 30 days).
DEVICE_TOKEN_TTL_SECONDS=2592000

# [DEFAULT: 72] Hours before an invitation link expires.
INVITE_TOKEN_TTL_HOURS=72

# [DEFAULT: 1.0] Biometric consent policy version string recorded with each consent.
BIOMETRIC_CONSENT_VERSION=1.0

# [DEFAULT: true] Whether to enforce HMAC signatures on Jetson event POST requests.
#   Set false only during initial Jetson setup/testing.
ENFORCE_EVENT_SIGNATURES=true

# [OPTIONAL] Publicly visible version string (shown in UI about page / Sentry releases).
VITE_APP_VERSION=


# =============================================================================
#  SECTION 14 — DATA RETENTION
#  How long each data class is kept before the nightly purge job removes it.
#  All values are in days unless the variable name says otherwise.
# =============================================================================

# [DEFAULT: 30] General event/frame data retention.
RETENTION_DAYS=30

# [DEFAULT: 730] Attendance records (2 years).
RETENTION_ATTENDANCE_DAYS=730

# [DEFAULT: 365] Audit log entries (1 year).
RETENTION_AUDIT_LOG_DAYS=365

# [DEFAULT: 90] Device event records.
RETENTION_DEVICE_EVENTS_DAYS=90

# [DEFAULT: 365] GDPR erasure request records.
RETENTION_GDPR_ERASURE_DAYS=365

# [DEFAULT: 3] Face embedding vectors retention in YEARS.
RETENTION_FACE_EMBEDDINGS_YEARS=3

# [DEFAULT: 90] Attendance ping records.
ATTENDANCE_PING_RETENTION_DAYS=90

# [DEFAULT: 24] Hours after upload before enrollment photos are purged from disk.
PHOTO_PURGE_DELAY_HOURS=24

# [DEFAULT: 60] How often (minutes) the photo purge cron runs.
PHOTO_PURGE_INTERVAL_MINUTES=60


# =============================================================================
#  SECTION 15 — PERFORMANCE TUNING
#  Safe to leave at defaults for single-node installs.
# =============================================================================

# [DEFAULT: 100] In-memory frame queue depth per inference worker.
FRAME_QUEUE_SIZE=100

# [DEFAULT: 1000] In-memory event queue depth.
EVENT_QUEUE_SIZE=1000

# [DEFAULT: 500] Snapshot queue depth.
SNAPSHOT_QUEUE_SIZE=500

# [DEFAULT: 4] Inference threads (only relevant when ENABLE_FACE_RECOGNITION=true).
INFERENCE_THREADS=4

# [DEFAULT: 2] Event push worker threads.
EVENT_PUSH_THREADS=2

# [DEFAULT: 80] Heap memory % threshold that triggers backpressure.
MAX_HEAP_MEMORY_PERCENT=80

# [DEFAULT: 3] Number of frames to skip between detections (reduces CPU load).
MOTION_SKIP_FRAMES=3

# [DEFAULT: 3] Snapshot upload concurrency.
SNAPSHOT_UPLOAD_CONCURRENCY=3

# [DEFAULT: 3] Max retries for failed snapshot uploads.
SNAPSHOT_MAX_RETRIES=3

# [DEFAULT: 1024] Max on-disk snapshot temp buffer in MB before oldest are evicted.
SNAPSHOT_MAX_TEMP_SIZE_MB=1024

# [DEFAULT: 80] JPEG compression quality for stored snapshots (1–100).
SNAPSHOT_COMPRESSION_QUALITY=80

# [DEFAULT: 15000] Outbound HTTP call timeout in milliseconds.
HTTP_TIMEOUT_MS=15000

# [DEFAULT: 3] Max retries for outbound HTTP calls.
HTTP_MAX_RETRIES=3

# [DEFAULT: 1000] Delay between HTTP retries in milliseconds.
HTTP_RETRY_DELAY_MS=1000

# [DEFAULT: 80] CPU % threshold for infra health SOP coordinator.
INFRA_CPU_THRESHOLD=80

# [DEFAULT: 90] Memory threshold in MB for infra health SOP coordinator.
INFRA_MEM_THRESHOLD_MB=90


# =============================================================================
#  SECTION 16 — AI EVALUATION (Drift & Bias Monitoring)
#  Monitors face recognition model accuracy over time.
# =============================================================================

# [DEFAULT: 0.03] Accuracy drift threshold that triggers an alert (3%).
AI_DRIFT_THRESHOLD=0.03

# [DEFAULT: 7] Rolling window in days for drift calculation.
AI_DRIFT_WINDOW_DAYS=7

# [DEFAULT: 604800000] Drift check interval in milliseconds (default: 7 days).
AI_DRIFT_INTERVAL_MS=604800000

# [DEFAULT: 0.05] Bias accuracy gap threshold between demographic groups (5%).
BIAS_ACCURACY_THRESHOLD=0.05

# [DEFAULT: 30] Days of data used for bias evaluation.
BIAS_SAMPLE_PERIOD_DAYS=30


# =============================================================================
#  SECTION 17 — DUPLICATE DETECTION
# =============================================================================

# [DEFAULT: 0.92] Cosine similarity above which two face embeddings are BLOCKED
#   as exact duplicates during enrollment.
DUPLICATE_SIMILARITY_BLOCK=0.92

# [DEFAULT: 0.85] Cosine similarity above which enrollment is FLAGGED for review.
DUPLICATE_SIMILARITY_FLAG=0.85


# =============================================================================
#  SECTION 18 — NGINX & SERVER PORTS
#  Only change these if you have port conflicts on the target machine.
# =============================================================================

# [DEFAULT: 8080] Port the Node.js backend listens on internally.
BACKEND_PORT=8080

# [DEFAULT: 80] Nginx HTTP port.
NGINX_HTTP_PORT=80

# [DEFAULT: 443] Nginx HTTPS port (only used in domain-ssl / selfsigned modes).
NGINX_HTTPS_PORT=443
